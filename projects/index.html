<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0e1a">
<meta name="color-scheme" content="light dark">
<meta name="description" content="Projets Weidler Studio : Crible+, Haven, Nexus Bridge, Project Inspector et Kios.">
<title>Projets | Weidler Studio</title>
<link rel="icon" href="../assets/logo/favicon.png" type="image/png">
<script src="../js/theme.js"></script>
<link rel="stylesheet" href="../css/site.css?v=8">
<link rel="stylesheet" href="../css/themes.css?v=8">
<link rel="stylesheet" href="../css/layout.css?v=8">
<link rel="stylesheet" href="../css/interactive.css?v=8">

<style>
:root {
    --bg-deep: #060810;
    --bg-top: #0c1222;
    --bg-surface: rgba(14, 20, 36, 0.72);
    --bg-card: rgba(12, 18, 32, 0.85);
    --border: rgba(56, 80, 120, 0.35);
    --text: #f0f4ff;
    --text-muted: #94a3b8;
    --text-muted-soft: #b4c1d3;
    --lead-color: #cbd5e1;
    --accent: #22d3ee;
    --accent-violet: #8b5cf6;
    --accent-soft: rgba(34, 211, 238, 0.1);
    --glow-cyan: 0 0 20px rgba(34, 211, 238, 0.18), 0 0 40px rgba(34, 211, 238, 0.06);
    --glow-violet: 0 0 20px rgba(139, 92, 246, 0.18), 0 0 40px rgba(139, 92, 246, 0.06);
    --glow-blue: 0 0 20px rgba(59, 130, 246, 0.18), 0 0 40px rgba(59, 130, 246, 0.06);
    --badge-soon: #64748b;
    --badge-tool: #3b82f6;
    --radius: 10px;
    --btn-radius: 15px;
    --font: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

*, *::before, *::after {
    box-sizing: border-box;
}

figure {
    margin: 0;
}

body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-deep) 55%, #040608 100%);
    color: var(--text);
    font-family: var(--font);
    line-height: 1.5;
    overflow-x: hidden;
    position: relative;
    isolation: isolate;
}

main.page-projects {
    max-width: min(1100px, 100%);
}

.page-projects .page-intro {
    margin-bottom: clamp(48px, 8vw, 72px);
}

.projects-carousel {
    text-align: center;
}

.carousel {
    display: grid;
    grid-template-columns: 46px minmax(0, 1fr) 46px;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: min(760px, 92%);
    margin: 0 auto;
}

.carousel-viewport {
    width: 100%;
    overflow: hidden;
    display: flex;
    justify-content: center;
    padding: 8px 0;
}

.carousel-track {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    width: max-content;
}

.carousel-item {
    width: 190px;
    height: 190px;
    overflow: hidden;
    border-radius: 24px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    opacity: .75;
    flex-shrink: 0;
}

.carousel-item img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    transform: none;
}

.carousel-item.active {
    transform: scale(1.05);
    opacity: 1;
    border-color: var(--accent);
    box-shadow: 0 0 22px rgba(34, 211, 238, 0.32);
}

.carousel-item.active img {
    transform: scale(1.12);
}

/* Correction ciblée : les images Project Inspector et Kios ont du noir dans les coins.
   On zoome seulement ces deux images pour cacher les contours internes. */
.carousel-item--project-inspector img,
.carousel-item--kios img {
    transform: scale(1.18);
}

.carousel-item--project-inspector.active img,
.carousel-item--kios.active img {
    transform: scale(1.22);
}

.carousel-arrow {
    width: 46px;
    height: 46px;
    border: 1px solid rgba(34, 211, 238, 0.34);
    border-radius: 50%;
    background: rgba(12, 18, 32, 0.92);
    color: #eaf2ff;
    font-size: 24px;
    font-weight: 700;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 14px rgba(34, 211, 238, 0.10);
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
}

.carousel-arrow:hover {
    background: rgba(16, 28, 48, 0.98);
    border-color: rgba(34, 211, 238, 0.62);
    box-shadow: 0 0 18px rgba(34, 211, 238, 0.24);
    transform: translateY(-1px) scale(1.04);
}

.carousel-arrow:active {
    transform: scale(0.96);
}

.carousel-dots {
    margin-top: 24px;
}

.dot {
    display: inline-block;
    width: 9px;
    height: 9px;
    margin: 0 5px;
    border-radius: 50%;
    background: rgba(148, 163, 184, 0.42);
}

.dot.active {
    background: var(--accent);
}

.project-detail {
    width: min(760px, 92%);
    margin: 42px auto 0;
    opacity: 1;
    transition: opacity .3s ease;
    text-align: left;
}

.page-hero,
.features-section,
.screenshots-section {
    margin-top: 32px;
    padding: 32px;
    border-radius: var(--radius);
    background: var(--bg-surface);
    border: 1px solid var(--border);
    box-shadow: var(--glow-cyan);
}

.cribleplus-hero-content {
    display: grid;
    grid-template-columns: 1fr 260px;
    gap: 32px;
    align-items: center;
}

.cribleplus-hero-content--single {
    grid-template-columns: 1fr;
}

.badge {
    display: inline-block;
    margin-bottom: 14px;
    padding: 5px 12px;
    border-radius: 999px;
    font-size: .78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
}

.project-card-badges {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 16px;
    width: 100%;
}

.project-card-badges__cell {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
}

.project-card-badges .badge {
    margin-bottom: 0;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-size: 0.68rem;
    padding: 4px 10px;
}

.badge-cat-type {
    background: rgba(139, 92, 246, 0.18);
    color: var(--accent-violet);
}

.badge-cat-platform {
    background: rgba(59, 130, 246, 0.15);
    color: var(--badge-tool);
}

.badge-dev {
    background: rgba(201, 162, 39, 0.18);
    color: #c9a227;
}

.badge-available {
    background: var(--accent-soft);
    color: var(--accent);
}

.badge-soon {
    background: rgba(100, 116, 139, 0.2);
    color: var(--badge-soon);
}

.badge-tool {
    background: rgba(59, 130, 246, 0.15);
    color: var(--badge-tool);
}

.cribleplus-hero-intro h1,
.features-title,
.screenshots-title {
    margin: 0 0 16px;
}

.features-title,
.screenshots-title {
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: .14em;
    font-size: .82rem;
}

.lead {
    margin: 0;
    color: var(--lead-color);
    line-height: 1.75;
    font-size: 1.05rem;
}

.cribleplus-hero-actions {
    text-align: center;
}

.cribleplus-app-logo {
    display: block;
    margin: 0 auto 18px;
    border-radius: 22px;
}

.btn-primary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 52px;
    padding: 0 22px;
    border-radius: var(--btn-radius);
    background: linear-gradient(180deg, rgba(16, 38, 68, 0.92) 0%, rgba(10, 24, 46, 0.96) 100%);
    color: var(--text);
    text-decoration: none;
    font-weight: 600;
    border: 1px solid rgba(34, 211, 238, 0.52);
    box-shadow: 0 0 16px rgba(34, 211, 238, 0.12), 0 4px 12px rgba(0, 0, 0, 0.22);
}

.note-muted {
    margin: 14px 0 0;
    color: var(--text-muted-soft);
    font-size: .9rem;
    line-height: 1.65;
}

.features-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
}

.nexus-advantages-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
}

.feature-card {
    padding: 20px;
    border-radius: var(--radius);
    background: var(--bg-card);
    border: 1px solid var(--border);
    box-shadow: 0 0 24px rgba(139, 92, 246, 0.06);
}

.feature-card h3 {
    margin: 0 0 10px;
}

.feature-card p {
    margin: 0;
    color: var(--text-muted-soft);
    line-height: 1.65;
}

.features-grid .feature-card:nth-child(4n + 1) {
    border-color: rgba(139, 92, 246, 0.28);
    box-shadow: var(--glow-violet);
}

.features-grid .feature-card:nth-child(4n + 2) {
    border-color: rgba(59, 130, 246, 0.28);
    box-shadow: var(--glow-blue);
}

.features-grid .feature-card:nth-child(4n + 3) {
    border-color: rgba(34, 211, 238, 0.28);
    box-shadow: var(--glow-cyan);
}

.features-grid .feature-card:nth-child(4n + 4) {
    border-color: rgba(139, 92, 246, 0.28);
    box-shadow: var(--glow-violet);
}

.screenshots-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: clamp(14px, 3vw, 20px);
}

.screenshot-card {
    margin: 0;
    overflow: hidden;
}

.screenshot-card img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 18px;
    border: 1px solid var(--border);
}

.screenshot-card figcaption {
    padding: 12px 14px;
    font-size: 0.85rem;
    color: var(--text-muted-soft);
    text-align: center;
    line-height: 1.65;
    border-top: 1px solid rgba(255,255,255,.14);
}

.haven-hero {
    display: block;
    margin-bottom: 12px;
    text-align: center;
}

.haven-intro {
    max-width: 760px;
    margin: 0 auto 48px;
    text-align: center;
}

.haven-summary-box {
    width: 100%;
    margin: 0 auto clamp(48px, 8vw, 72px);
    padding: 32px;
    border-radius: var(--radius);
    background: var(--bg-surface);
    border: 1px solid var(--border);
    box-shadow: var(--glow-cyan);
    text-align: center;
    box-sizing: border-box;
}

.haven-summary-box .badge {
    margin-left: auto;
    margin-right: auto;
}

.haven-summary-box h1 {
    margin: 0 0 16px;
}

.haven-summary-box .haven-subtitle {
    margin-bottom: 20px;
}

.haven-summary-box .lead {
    margin-bottom: 18px;
}

.haven-summary-box .lead:last-child {
    margin-bottom: 0;
}

.haven-intro .haven-subtitle {
    margin-bottom: 20px;
}

.haven-intro .lead {
    margin-bottom: 18px;
}

.haven-shots-section {
    margin-bottom: clamp(48px, 8vw, 72px);
    display: flex;
    justify-content: center;
}

.haven-shots {
    display: flex;
    flex-direction: row;
    flex-wrap: nowrap;
    justify-content: center;
    align-items: flex-start;
    gap: 0;
    width: 100%;
    max-width: 100%;
    margin: 0 auto;
}

.haven-shot {
    flex: 1 1 0;
    width: auto;
    max-width: none;
    min-width: 0;
    overflow: hidden;
    border-radius: 0;
    border: 1px solid rgba(34, 211, 238, 0.28);
    margin: 0 0 0 -1px;
    background: var(--bg-card);
    box-shadow: var(--glow-cyan);
}

.haven-shot:first-child {
    margin-left: 0;
    border-radius: 10px 0 0 10px;
}

.haven-shot:last-child {
    border-radius: 0 10px 10px 0;
}

.haven-shot img {
    display: block;
    width: 100%;
    height: auto;
    object-fit: contain;
}

.haven-benefits-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: clamp(16px, 3vw, 24px);
    width: 100%;
    max-width: 100%;
    margin: 0 auto;
}

.haven-benefits .feature-card {
    text-align: left;
}

.haven-benefits-grid .feature-card:nth-child(4n + 1),
.haven-benefits-grid .feature-card:nth-child(4n + 4),
.nexus-advantages-grid .feature-card:nth-child(4n + 1),
.nexus-advantages-grid .feature-card:nth-child(4n + 4) {
    border-color: rgba(139, 92, 246, 0.28);
    box-shadow: var(--glow-violet);
}

.haven-benefits-grid .feature-card:nth-child(4n + 2),
.nexus-advantages-grid .feature-card:nth-child(4n + 2) {
    border-color: rgba(59, 130, 246, 0.28);
    box-shadow: var(--glow-blue);
}

.haven-benefits-grid .feature-card:nth-child(4n + 3),
.nexus-advantages-grid .feature-card:nth-child(4n + 3) {
    border-color: rgba(34, 211, 238, 0.28);
    box-shadow: var(--glow-cyan);
}

.haven-hero.page-hero,
.haven-benefits.features-section {
    padding: 0;
    background: transparent;
    border: 0;
    border-radius: 0;
}

.haven-benefits.features-section {
    width: 100%;
    background: transparent;
    border: 0;
    box-shadow: none;
    padding: 0;
}

.cribleplus-benefits.features-section {
    width: 100%;
    background: transparent;
    border: 0;
    box-shadow: none;
    padding: 0;
}

/* Nexus Bridge — contenu fusionné */
.nexus-bridge-hero {
    display: block;
}

.preview-box {
    background: var(--bg-card);
    border: 1px solid rgba(34, 211, 238, 0.28);
    border-radius: 10px;
    aspect-ratio: 16 / 10;
    min-height: 160px;
    width: 100%;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(34, 211, 238, 0.18), 0 0 40px rgba(34, 211, 238, 0.06);
}

.preview-box img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    display: block;
}

.preview-box.contain img {
    object-fit: contain;
    padding: 16px;
}

.nexus-bridge-preview img {
    object-fit: contain;
    object-position: center;
    padding: 16px;
}


.hero-app-shot {
    margin: 0 0 clamp(40px, 8vw, 64px);
    padding: 0;
    background: var(--bg-card);
    border: 1px solid rgba(34, 211, 238, 0.28);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 0 20px rgba(34, 211, 238, 0.18), 0 0 40px rgba(34, 211, 238, 0.06);
    width: 100%;
}

.hero-app-shot--full {
    line-height: 0;
}

.hero-app-shot--full img {
    display: block;
    width: 100%;
    height: auto;
    max-width: none;
    object-fit: contain;
    vertical-align: top;
}

.discussion-subtitle {
    color: rgba(248,250,252,.72);
    font-size: clamp(0.88rem, 2.4vw, 0.95rem);
    margin-bottom: 24px;
    line-height: 1.68;
    max-width: 60ch;
}

@media (max-width: 992px) {
    .nexus-bridge-hero {
        grid-template-columns: 1fr;
    }

    .nexus-bridge-preview {
        order: -1;
        max-height: 280px;
    }
}


/* Project Inspector — intégré au carrousel */
.pi-section.features-section {
    width: 100%;
    background: transparent;
    border: 0;
    box-shadow: none;
    padding: 0;
}

.pi-features-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    max-width: min(760px, 100%);
    margin: 0 auto;
    align-items: stretch;
}

.pi-features-grid .feature-card {
    height: 100%;
}

.pi-hero.page-hero {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    box-shadow: var(--glow-cyan);
    border-radius: var(--radius);
}

/* ── Project Inspector — page produit ── */

.pi-hero {
    display: block;
    margin-bottom: clamp(48px, 8vw, 72px);
}

.pi-hero .btn-primary {
    margin-top: 4px;
}

.pi-screenshot {
    margin: 0 auto clamp(48px, 8vw, 72px);
    max-width: min(920px, 100%);
    width: 100%;
    padding: 0;
    border: 1px solid rgba(34, 211, 238, 0.28);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--glow-cyan), 0 12px 32px rgba(0, 0, 0, 0.28);
    background: var(--bg-card);
}

.pi-screenshot img {
    display: block;
    width: 100%;
    height: auto;
}

.pi-report-intro {
    max-width: 60ch;
    margin: 0 auto clamp(20px, 4vw, 28px);
    text-align: center;
    color: var(--text-muted-soft);
    font-size: clamp(0.88rem, 2.4vw, 0.95rem);
    line-height: 1.68;
}

.pi-report-log {
    margin: 0 auto;
    max-width: min(900px, 100%);
    padding: clamp(16px, 3vw, 20px);
    max-height: min(420px, 55vh);
    overflow: auto;
    background: rgba(6, 10, 20, 0.88);
    border: 1px solid rgba(34, 211, 238, 0.22);
    border-radius: var(--radius);
    box-shadow: inset 0 0 24px rgba(34, 211, 238, 0.04), var(--glow-cyan);
    font-family: "Cascadia Code", "Consolas", "Courier New", monospace;
    font-size: clamp(0.72rem, 1.8vw, 0.82rem);
    line-height: 1.45;
    color: #94a3b8;
    white-space: pre;
    tab-size: 4;
}

.pi-report-log code {
    font: inherit;
    color: inherit;
}

.pi-workflow {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: clamp(12px, 2vw, 16px);
    list-style: none;
    padding: 0;
    margin: 0;
}

.pi-workflow-step {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: clamp(16px, 3vw, 20px);
    text-align: center;
    box-shadow: 0 0 24px rgba(139, 92, 246, 0.06);
    transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
}

.pi-workflow-step:nth-child(5n + 1) {
    border-color: rgba(139, 92, 246, 0.28);
    box-shadow: var(--glow-violet);
}

.pi-workflow-step:nth-child(5n + 2) {
    border-color: rgba(59, 130, 246, 0.28);
    box-shadow: var(--glow-blue);
}

.pi-workflow-step:nth-child(5n + 3) {
    border-color: rgba(34, 211, 238, 0.28);
    box-shadow: var(--glow-cyan);
}

.pi-workflow-step:nth-child(5n + 4) {
    border-color: rgba(139, 92, 246, 0.28);
    box-shadow: var(--glow-violet);
}

.pi-workflow-step:nth-child(5n + 5) {
    border-color: rgba(59, 130, 246, 0.28);
    box-shadow: var(--glow-blue);
}

.pi-workflow-step:hover {
    transform: translateY(-2px);
    border-color: rgba(34, 211, 238, 0.35);
}

.pi-workflow-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 2rem;
    height: 2rem;
    margin-bottom: 12px;
    border-radius: 50%;
    background: rgba(34, 211, 238, 0.12);
    border: 1px solid rgba(34, 211, 238, 0.35);
    color: var(--accent);
    font-size: 0.85rem;
    font-weight: 700;
}

.pi-workflow-step p {
    margin: 0;
    font-size: clamp(0.82rem, 2vw, 0.9rem);
    line-height: 1.65;
    color: var(--text-muted-soft);
}

@media (max-width: 900px) {
    .pi-workflow {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 700px) {
    .pi-features-grid {
        grid-template-columns: 1fr;
    }
}

@media (max-width: 640px) {
    /* Même colonne d’alignement que .project-detail (min(760px, 92%) sur PC) */
    .projects-carousel {
        width: min(760px, 92%);
        margin-left: auto;
        margin-right: auto;
    }

    .carousel {
        width: 100%;
    }

    /* Carrousel — image active seule, sans bandes latérales */
    .carousel-track {
        gap: 0;
        width: 100%;
        justify-content: center;
    }

    .carousel-item:not(.active) {
        display: none;
    }

    .carousel-item.active {
        width: min(240px, 74vw);
        height: min(240px, 74vw);
        transform: none;
    }

    /* Contenu sous le carrousel — progression et espacements cohérents */
    .project-detail {
        margin-top: clamp(24px, 5vw, 32px);
    }

    .page-hero,
    .features-section,
    .screenshots-section {
        margin-top: clamp(20px, 4.5vw, 28px);
        padding: clamp(18px, 4vw, 22px);
    }

    .haven-summary-box {
        margin-top: 0;
        margin-bottom: clamp(20px, 4.5vw, 28px);
        padding: clamp(18px, 4vw, 22px);
    }

    .project-detail > *:first-child {
        margin-top: 0;
    }

    .features-title,
    .screenshots-title {
        margin-bottom: clamp(14px, 3vw, 18px);
    }

    .hero-app-shot,
    .pi-screenshot {
        margin-top: clamp(20px, 4.5vw, 28px);
        margin-bottom: clamp(20px, 4.5vw, 28px);
    }

    .pi-hero {
        margin-bottom: clamp(20px, 4.5vw, 28px);
    }

    .haven-shots-section {
        margin-bottom: clamp(20px, 4.5vw, 28px);
    }

    .lead + .lead {
        margin-top: 0.85em;
    }

    .discussion-subtitle {
        margin-bottom: clamp(16px, 3vw, 20px);
    }

    /* Grilles — une colonne, texte lisible (dont « Comment ça fonctionne ») */
    .features-grid,

let currentIndex = 1;
let isAnimating = false;

const track = document.querySelector(".carousel-track");
const dots = document.querySelectorAll(".dot");
const arrows = document.querySelectorAll(".carousel-arrow");
const detail = document.querySelector("#projectDetail");

function getProjectIndex(offset) {
    return (currentIndex + offset + projects.length) % projects.length;
}

function createItem(project, isActive = false) {
    const item = document.createElement("div");
    item.className = isActive ? "carousel-item active" : "carousel-item";
    item.classList.add("carousel-item--" + project.id);

    const img = document.createElement("img");
    img.src = project.image;
    img.alt = project.alt;

    item.appendChild(img);
    return item;
}

function renderCarousel() {
    track.innerHTML = "";

    track.appendChild(createItem(projects[getProjectIndex(-1)]));
    track.appendChild(createItem(projects[getProjectIndex(0)], true));
    track.appendChild(createItem(projects[getProjectIndex(1)]));

    dots.forEach((dot, index) => {
        dot.classList.toggle("active", index === currentIndex);
    });

    detail.innerHTML = projects[currentIndex].template;

    if (projects[currentIndex].id === "project-inspector") {
        const reportContent = document.getElementById("pi-report-content");
        if (reportContent) {
            fetch("../assets/projects/project-inspector/logprojectinspector.txt")
                .then(function (response) {
                    if (!response.ok) throw new Error("Rapport indisponible");
                    return response.text();
                })
                .then(function (reportText) {
                    reportContent.textContent = reportText;
                })
                .catch(function () {
                    reportContent.textContent = "Rapport indisponible.";
                });
        }
    }
}

function changeProject(direction) {
    if (isAnimating) return;
    isAnimating = true;

    detail.style.opacity = "0";

    setTimeout(() => {
        currentIndex = getProjectIndex(direction);
        renderCarousel();
        detail.style.opacity = "1";

        setTimeout(() => {
            isAnimating = false;
        }, 300);
    }, 300);
}

arrows[0].addEventListener("click", () => {
    changeProject(-1);
});

arrows[1].addEventListener("click", () => {
    changeProject(1);
});

renderCarousel();
</script>
